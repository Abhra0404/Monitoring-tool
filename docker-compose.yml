version: "3.8"

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  monitorx:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-4000}:4000"
    environment:
      - PORT=4000
      - MONGO_URI=mongodb://mongo:27017/monitorx
      - JWT_SECRET=${JWT_SECRET:-changeme_generate_a_real_secret}
    depends_on:
      mongo:
        condition: service_healthy

volumes:
  mongo-data:
