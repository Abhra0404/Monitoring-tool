<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <title>Theoria</title>

      name="description"
      content="Theoria is the open-source monitoring stack: server metrics, synthetic checks, alerting, incidents and a public status page in one binary. Self-hosted, horizontally scalable, OTLP-native."
    />

    <meta property="og:type" content="website" />
    <meta property="og:title" content="Theoria — One tool for servers, synthetics, alerts and status." />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Theoria — Self-hosted monitoring." />
    <meta name="twitter:description" content="Servers + synthetics + alerts + status page in one binary. Apache 2.0." />
    <meta name="twitter:image" content="/og.png" />

        "@context": "https://schema.org",

        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
