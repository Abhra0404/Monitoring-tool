name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    name: Server (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
          cache-dependency-path: server/package-lock.json
      - name: Install
        working-directory: server
        run: npm ci --legacy-peer-deps
      - name: Type check
        working-directory: server
        run: npx tsc --noEmit
      - name: Test
        working-directory: server
        run: npx vitest run --reporter=default

  client:
    name: Client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json
      - name: Install
        working-directory: client
        run: npm ci --legacy-peer-deps
      - name: Type check
        working-directory: client
        run: npx tsc --noEmit
      - name: Build
        working-directory: client
        run: npm run build

  agent:
    name: Agent (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: agent/go.sum
      - name: Vet
        working-directory: agent
        run: go vet ./...
      - name: Test
        working-directory: agent
        run: go test ./...
      - name: Cross-compile
        working-directory: agent
        run: make build-all

  security:
    name: Security scans
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: npm audit (server)
        working-directory: server
        run: npm audit --production --audit-level=high || true
      - name: npm audit (client)
        working-directory: client
        run: npm audit --production --audit-level=high || true
